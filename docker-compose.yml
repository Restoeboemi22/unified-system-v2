version: '3.8'

# ==========================================
# KONFIGURASI DOCKER COMPOSE UNTUK VPS (V2)
# ==========================================

services:
  session-service:
    build:
      context: .
      args:
        SERVICE_PATH: services/session-service
    container_name: session-service
    ports:
      - "4001:3000"
    environment:
      - DATABASE_URL=file:../.data/session.db
      - TENANT_SCHOOL_SERVICE_BASE_URL=http://tenant-school-service:3000
    volumes:
      - session-data:/app/.data
    restart: unless-stopped

  policy-service:
    build:
      context: .
      args:
        SERVICE_PATH: services/policy-service
    container_name: policy-service
    ports:
      - "4002:3000"
    environment:
      - DATABASE_URL=file:../.data/policy.db
      - SESSION_SERVICE_BASE_URL=http://session-service:3000
    volumes:
      - policy-data:/app/.data
    restart: unless-stopped

  tenant-school-service:
    build:
      context: .
      args:
        SERVICE_PATH: services/tenant-school-service
    container_name: tenant-school-service
    ports:
      - "4003:3000"
    environment:
      - DATABASE_URL=file:../.data/tenant.db
      - SESSION_SERVICE_BASE_URL=http://session-service:3000
      - POLICY_SERVICE_BASE_URL=http://policy-service:3000
      - NODE_ENV=${NODE_ENV:-development}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - tenant-data:/app/.data
    restart: unless-stopped

  academic-directory-service:
    build:
      context: .
      args:
        SERVICE_PATH: services/academic-directory-service
    container_name: academic-directory-service
    ports:
      - "4004:3000"
    environment:
      - DATABASE_URL=file:../.data/academic.db
      - SESSION_SERVICE_BASE_URL=http://session-service:3000
      - POLICY_SERVICE_BASE_URL=http://policy-service:3000
    volumes:
      - academic-data:/app/.data
    restart: unless-stopped

  attendance-service:
    build:
      context: .
      args:
        SERVICE_PATH: services/attendance-service
    container_name: attendance-service
    ports:
      - "4005:3000"
    environment:
      - DATABASE_URL=file:../.data/attendance.db
      - SESSION_SERVICE_BASE_URL=http://session-service:3000
      - POLICY_SERVICE_BASE_URL=http://policy-service:3000
    volumes:
      - attendance-data:/app/.data
    restart: unless-stopped

  web-admin:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web-admin
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  session-data:
  policy-data:
  tenant-data:
  academic-data:
  attendance-data:
